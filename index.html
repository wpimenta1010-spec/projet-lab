<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh;font-size:15px}
:root{--red:#C0392B;--green:#27AE60;--gray:#636366;--gray2:#AEAEB2;--line:#E5E5EA;--bg:#F2F2F7;--white:#fff;--dark:#1C1C1E}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);padding:16px}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:400px}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:44px;height:44px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;flex-shrink:0}
.logo-name{font-size:18px;font-weight:700}
.logo-sub{font-size:12px;color:var(--gray)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:14px;color:var(--gray);margin-bottom:24px}

/* ── FORM ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--gray)}
.field input,.field select,.field textarea{font-family:'Inter',sans-serif;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:13px 14px;color:var(--dark);background:var(--bg);outline:none;width:100%;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--red);background:#fff}
.field textarea{resize:vertical;min-height:80px;font-size:15px}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:14px 20px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;min-height:48px}
.btn-p{background:var(--red);color:#fff}
.btn-p:active{background:#a93226}
.btn-p:disabled{opacity:.5}
.btn-s{background:var(--bg);color:var(--dark);border:1px solid var(--line)}
.btn-s:active{background:var(--line)}
.btn-sm{padding:9px 14px;font-size:13px;min-height:36px}
.btn-full{width:100%}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* Top header (mobile) */
.topbar{display:none;background:var(--dark);color:#fff;padding:0 16px;height:56px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
.topbar-icon{width:28px;height:28px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.topbar-user{font-size:12px;color:var(--gray2)}

/* Desktop sidebar */
.sidebar{width:220px;background:var(--dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-logo{padding:16px;border-bottom:1px solid #3A3A3C;display:flex;align-items:center;gap:9px}
.sb-icon{width:30px;height:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sb-name{font-size:14px;font-weight:700}
.sb-sub{font-size:10px;color:var(--gray2)}
.sb-nav{flex:1;padding:10px;overflow-y:auto}
.nav-sec{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray2);padding:10px 8px 4px;font-weight:600}
.nav-btn{display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--gray2);border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-btn:hover,.nav-btn:active{background:#2C2C2E;color:#fff}
.nav-btn.active{background:var(--red);color:#fff}
.sb-footer{padding:14px;border-top:1px solid #3A3A3C}
.user-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.avatar{width:32px;height:32px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.uname{font-size:13px;font-weight:600}
.urole{font-size:11px;color:var(--gray2);text-transform:capitalize}

/* Main content */
.main{margin-left:220px;padding:24px;flex:1;padding-bottom:80px}

/* Bottom nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:100;padding:4px 0 env(safe-area-inset-bottom,0)}
.bn-items{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:none;cursor:pointer;color:var(--gray2);font-size:10px;font-weight:500;min-width:56px}
.bn-item.active{color:var(--red)}
.bn-item .bn-ic{font-size:22px;line-height:1}
.bn-more-menu{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--line);z-index:200;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0))}
.bm-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:10px;border:none;background:none;width:100%;text-align:left;font-size:15px;font-weight:500;cursor:pointer}
.bm-item.active{background:#FEF2F2;color:var(--red)}
.bm-item:active{background:var(--bg)}
.bm-icon{font-size:20px;width:24px}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .topbar{display:flex}
  .bottom-nav{display:block}
  .main{margin-left:0;padding:16px;padding-bottom:90px}
}

/* ── CARDS & CONTENT ── */
.ph{margin-bottom:20px}
.ph-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.pt{font-size:20px;font-weight:700}
.ps{font-size:13px;color:var(--gray);margin-top:3px}
.card{background:#fff;border-radius:14px;border:1px solid var(--line);margin-bottom:16px;overflow:hidden}
.ch{background:var(--dark);color:#fff;padding:13px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.ch-red{background:var(--red)}
.cb{padding:16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:600px){.stats{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.stats{grid-template-columns:repeat(5,1fr)}}
.stat{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--line)}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);font-weight:600;margin-bottom:7px}
.sv{font-size:28px;font-weight:700}
.ss{font-size:11px;color:var(--gray);margin-top:4px}
.s-ok{border-top:3px solid var(--green)}
.s-err{border-top:3px solid var(--red)}
.s-warn{border-top:3px solid #F39C12}
.s-info{border-top:3px solid #2D6A9F}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
thead th{background:var(--dark);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--line)}
tbody tr:last-child{border-bottom:none}
tbody tr:active{background:#F9F9FB}
tbody td{padding:12px}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.p-ok{background:#ECFDF5;color:#15803D}
.p-err{background:#FEF2F2;color:#B91C1C}
.p-warn{background:#FFFBEB;color:#B45309}
.p-pend{background:#F0F0F5;color:var(--gray)}
.p-info{background:#EFF6FF;color:#1E40AF}

/* ALERT */
.alert{border-radius:10px;padding:13px 15px;margin-bottom:12px;font-size:14px}
.a-err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.a-ok{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}
.a-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.a-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:600px){.overlay{align-items:center;padding:16px}}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
@media(min-width:600px){.modal{border-radius:16px;max-width:520px;max-height:90vh}}
.mh{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--line);padding-bottom:14px}
.mt{font-size:17px;font-weight:700}
.mc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);padding:4px;min-width:36px;min-height:36px}
.mb{padding:16px 20px 20px}

/* FORM GRID */
.fg{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:500px){.fg{grid-template-columns:repeat(2,1fr)}}
.fc{grid-column:1/-1}

/* MISC */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--gray);font-size:14px;gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--gray);font-size:14px}
.empty-i{font-size:36px;margin-bottom:12px}
.br{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

/* NF cards on mobile */
.nf-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
@media(min-width:500px){.nf-grid{grid-template-columns:repeat(2,1fr)}}
.cp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
@media(min-width:400px){.cp-grid{grid-template-columns:repeat(3,1fr)}}
</style>

function Login({onLogin}){
  const[email,setEmail]=useState('');
  const[senha,setSenha]=useState('');
  const[load,setLoad]=useState(false);
  const[err,setErr]=useState('');
  const login=async e=>{
    e.preventDefault();setLoad(true);setErr('');

    if(error){setErr('Email ou senha incorretos.');setLoad(false);return;}

  return h('div',{className:'login-wrap'},
    h('div',{className:'login-box'},
      h('div',{className:'logo-row'},h('div',{className:'logo-icon'},'P'),h('div',null,h('div',{className:'logo-name'},'Projet'),h('div',{className:'logo-sub'},'Controle Tecnológico de Concreto'))),

      err&&h('div',{className:'alert a-err'},err),
      h('form',{onSubmit:login},
        h('div',{className:'field'},h('label',null,'Email'),h('input',{type:'email',value:email,onChange:e=>setEmail(e.target.value),placeholder:'seu@email.com',required:true,autoComplete:'email'})),
        h('div',{className:'field'},h('label',null,'Senha'),h('input',{type:'password',value:senha,onChange:e=>setSenha(e.target.value),placeholder:'••••••••',required:true,autoComplete:'current-password'})),
        h('button',{className:'btn btn-p btn-full',type:'submit',disabled:load},load?'Entrando...':'Entrar')
      )
    )

}

// ── BOTTOM NAV (mobile) ──────────────────────────────────
function BottomNav({perfil,pag,setPag}){
  const[moreOpen,setMoreOpen]=useState(false);
  const isAdmin=perfil.perfil==='admin';
  const isLab=perfil.perfil==='laboratorio'||isAdmin;

  const mainItems=[
    {ic:'📊',lb:'Dashboard',pg:'dashboard'},
    {ic:'🧱',lb:'Amostras',pg:'amostras'},
    {ic:'🔔',lb:'CPs Hoje',pg:'cpsdia'},
    {ic:'🪣',lb:'Moldagem',pg:'moldagem'},
    {ic:'☰',lb:'Mais',pg:'__more'},
  ];

  const moreItems=[
    isLab&&{ic:'🧪',lb:'Recebimento',pg:'recebimento'},
    isLab&&{ic:'🗓️',lb:'Cura',pg:'cura'},
    isLab&&{ic:'📄',lb:'Relatórios',pg:'relatorios'},
    isAdmin&&{ic:'🏢',lb:'Obras',pg:'obras'},
    isAdmin&&{ic:'👥',lb:'Usuários',pg:'usuarios'},
    isAdmin&&{ic:'📥',lb:'Importar',pg:'importar'},
  ].filter(Boolean);

  return h(Fragment,null,
    h('div',{className:'bottom-nav'},
      h('div',{className:'bn-items'},
        mainItems.map(it=>h('button',{key:it.pg,className:'bn-item'+(pag===it.pg||it.pg==='__more'&&moreOpen?' active':''),
          onClick:()=>it.pg==='__more'?setMoreOpen(o=>!o):setPag(it.pg)},
          h('span',{className:'bn-ic'},it.ic),it.lb
        ))
      )
    ),
    moreOpen&&h(Fragment,null,
      h('div',{className:'overlay-bg',onClick:()=>setMoreOpen(false)}),
      h('div',{className:'bn-more-menu'},
        moreItems.map(it=>h('button',{key:it.pg,className:'bm-item'+(pag===it.pg?' active':''),
          onClick:()=>{setPag(it.pg);setMoreOpen(false);}},
          h('span',{className:'bm-icon'},it.ic),it.lb
        )),
        h('button',{className:'bm-item',onClick:()=>setMoreOpen(false)},h('span',{className:'bm-icon'},'✕'),'Fechar')

// ── DESKTOP SIDEBAR ──────────────────────────────────────
function Sidebar({perfil,pag,setPag,logout}){
  const isAdmin=perfil.perfil==='admin';
  const isCampo=perfil.perfil==='campo'||isAdmin;
  const isLab=perfil.perfil==='laboratorio'||isAdmin;

    h('nav',{className:'sb-nav'},
      h('div',{className:'nav-sec'},'Geral'),it('📊','Dashboard','dashboard'),it('🧱','Amostras','amostras'),it('🔔','CPs do Dia','cpsdia'),

// ── DASHBOARD ────────────────────────────────────────────
function Dashboard({perfil}){
  const[s,setS]=useState({total:0,ag:0,ok:0,nok:0,hoje:0});
  const[load,setLoad]=useState(true);
  useEffect(()=>{
    (async()=>{
      const hoje=new Date().toISOString().split('T')[0];
      const[a,b,c,d,e]=await Promise.all([
        sb.from('amostras').select('*',{count:'exact',head:true}),
        sb.from('amostras').select('*',{count:'exact',head:true}).eq('fluxo','aguardando_recebimento'),
        sb.from('amostras').select('*',{count:'exact',head:true}).eq('status_resultado','ok'),
        sb.from('amostras').select('*',{count:'exact',head:true}).eq('status_resultado','nok'),
        sb.from('amostras').select('*',{count:'exact',head:true}).eq('data_rompimento',hoje).eq('fluxo','recebido').is('fc_resultado',null),
      ]);
      setS({total:a.count||0,ag:b.count||0,ok:c.count||0,nok:d.count||0,hoje:e.count||0});setLoad(false);
    })();
  },[]);
  const n1=(perfil.nome||'').split(' ')[0];
  if(load)return h('div',{className:'loading'},h('div',{className:'spin'}),'Carregando...');
  return h('div',null,
    h('div',{className:'ph'},h('div',{className:'pt'},'Dashboard'),h('div',{className:'ps'},'Olá, '+n1+'! Visão geral do controle.')),
    h('div',{className:'stats'},
      h('div',{className:'stat s-info'},h('div',{className:'sl'},'Total CPs'),h('div',{className:'sv'},s.total),h('div',{className:'ss'},'registrados')),
      h('div',{className:'stat s-ok'},h('div',{className:'sl'},'Aprovados'),h('div',{className:'sv'},s.ok),h('div',{className:'ss'},'fc ≥ fck')),
      h('div',{className:'stat s-err'},h('div',{className:'sl'},'Reprovados'),h('div',{className:'sv'},s.nok),h('div',{className:'ss'},'fc < fck')),
      h('div',{className:'stat s-warn'},h('div',{className:'sl'},'Rompem Hoje'),h('div',{className:'sv'},s.hoje),h('div',{className:'ss'},'sem resultado')),
      h('div',{className:'stat',style:{borderTop:'3px solid var(--gray)'}},h('div',{className:'sl'},'Aguardando'),h('div',{className:'sv'},s.ag),h('div',{className:'ss'},'recebimento'))
    )
  );
}

// ── OBRAS ────────────────────────────────────────────────
function Obras(){
  const[obras,setObras]=useState([]);
  const[load,setLoad]=useState(true);

// ── AMOSTRAS ─────────────────────────────────────────────
function Amostras(){
  const[lista,setLista]=useState([]);const[load,setLoad]=useState(true);
  const[pag,setPag]=useState(1);const[total,setTotal]=useState(0);
  const[busca,setBusca]=useState('');const[fst,setFst]=useState('');
  const PG=30;
  const load2=useCallback(async()=>{
    setLoad(true);
    let q=sb.from('amostras').select('*,obras(cliente,nome)',{count:'exact'});
    if(busca)q=q.or('id_am.ilike.%'+busca+'%,etiqueta_campo.ilike.%'+busca+'%,elemento.ilike.%'+busca+'%');
    if(fst)q=q.eq('status_resultado',fst);
    const{data,count}=await q.order('data_moldagem',{ascending:false}).range((pag-1)*PG,pag*PG-1);
    setLista(data||[]);setTotal(count||0);setLoad(false);
  },[pag,busca,fst]);
  useEffect(()=>{load2();},[load2]);

  const updFc=async(id,val,fck)=>{
    const v=parseFloat(val);if(isNaN(v))return;
    const status=fck?(v>=fck?'ok':'nok'):'sem_fck';
    await sb.from('amostras').update({fc_resultado:v,status_resultado:status}).eq('id',id);
    load2();
  };
  const pill=a=>{
    if(a.fluxo==='aguardando_recebimento')return h('span',{className:'pill p-warn'},'🚚');
    const m={ok:['p-ok','✔'],nok:['p-err','✘'],pendente:['p-pend','⏳'],sem_fck:['p-warn','⚠']};
    const[c,l]=m[a.status_resultado]||['p-pend','–'];
    return h('span',{className:'pill '+c},l);
  };
  const tp=Math.ceil(total/PG);
  return h('div',null,
    h('div',{className:'ph'},h('div',{className:'pt'},'Amostras'),h('div',{className:'ps'},total+' registros')),
    h('div',{className:'card'},
      h('div',{className:'cb',style:{paddingBottom:8}},
        h('div',{className:'field',style:{margin:0,marginBottom:10}},h('label',null,'Buscar'),h('input',{placeholder:'ID, etiqueta, elemento...',value:busca,onChange:e=>{setBusca(e.target.value);setPag(1);}})),
        h('div',{className:'field',style:{margin:0}},h('label',null,'Situação'),
          h('select',{value:fst,onChange:e=>{setFst(e.target.value);setPag(1);}},
            h('option',{value:''},'Todas'),h('option',{value:'pendente'},'Pendente'),h('option',{value:'ok'},'Aprovado'),h('option',{value:'nok'},'Reprovado'),h('option',{value:'sem_fck'},'Sem fck')
          )
        )
      ),
      h('div',{className:'tw'},
        load?h('div',{className:'loading'},h('div',{className:'spin'}),'Carregando...'):
        h('table',null,
          h('thead',null,h('tr',null,h('th',null,'Registro'),h('th',null,'Obra'),h('th',null,'Moldagem'),h('th',null,'Ruptura'),h('th',null,'Id'),h('th',null,'fck'),h('th',null,'fc'),h('th',null,''))),
          h('tbody',null,lista.map(a=>h('tr',{key:a.id},
            h('td',null,a.id_am||a.etiqueta_campo),
            h('td',{style:{fontSize:12}},a.obras?.nome),
            h('td',null,fmtD(a.data_moldagem)),
            h('td',null,fmtD(a.data_rompimento)),
            h('td',null,(a.idade_dias||'–')+'d'),
            h('td',null,a.fck_projeto||'–'),
            h('td',null,h('input',{type:'number',step:'0.01',defaultValue:a.fc_resultado||'',placeholder:'–',style:{width:65,padding:'4px 6px',border:'1px solid var(--line)',borderRadius:6,fontSize:13},onBlur:e=>updFc(a.id,e.target.value,a.fck_projeto)})),
            h('td',null,pill(a))
          )))
        )
      ),
      tp>1&&h('div',{className:'cb',style:{display:'flex',gap:10,alignItems:'center',paddingTop:10}},
        h('button',{className:'btn btn-s btn-sm',disabled:pag<=1,onClick:()=>setPag(p=>p-1)},'←'),
        h('span',{style:{fontSize:13,color:'var(--gray)'}},pag+'/'+tp),
        h('button',{className:'btn btn-s btn-sm',disabled:pag>=tp,onClick:()=>setPag(p=>p+1)},'→')
      )
    )
  );
}

function Moldagem({perfil}){
  const[obras,setObras]=useState([]);const[obraId,setObraId]=useState('');
  const[data,setData]=useState(new Date().toISOString().split('T')[0]);
  const[obs,setObs]=useState('');const[nfs,setNfs]=useState([]);

    for(const nf of nfs){

      if(en)continue;
      const dr=new Date(data+'T00:00:00');dr.setDate(dr.getDate()+parseInt(nf.idade));

    }

    h('div',{className:'card'},h('div',{className:'ch'},'📝 Dados Gerais'),h('div',{className:'cb'},
      h('div',{className:'field'},h('label',null,'Obra'),
        h('select',{value:obraId,onChange:e=>setObraId(e.target.value)},
          h('option',{value:''},'Selecione...'),obras.map(o=>h('option',{key:o.id,value:o.id},o.cliente+' — '+o.nome))
        )
      ),
      h('div',{className:'field'},h('label',null,'Data'),h('input',{type:'date',value:data,onChange:e=>setData(e.target.value)})),
      h('div',{className:'field'},h('label',null,'Observações'),h('textarea',{value:obs,onChange:e=>setObs(e.target.value),placeholder:'Condições gerais...'}))
    )),
    ...nfs.map((nf,idx)=>h('div',{className:'card',key:nf.id},
      h('div',{className:'ch'},'🧾 NF #'+(idx+1)+(nf.nf?' — '+nf.nf:''),
        h('button',{onClick:()=>remNF(nf.id),style:{marginLeft:'auto',background:'transparent',border:'1px solid #555',color:'#fff',padding:'4px 10px',borderRadius:5,cursor:'pointer',fontSize:12}},'✕')
      ),
      h('div',{className:'cb'},
        h('div',{className:'nf-grid'},
          h('div',{className:'field'},h('label',null,'Elemento'),h('input',{value:nf.elemento,onChange:e=>up(nf.id,'elemento',e.target.value),placeholder:'Ex: Pilar P-12'})),
          h('div',{className:'field'},h('label',null,'Nº NF'),h('input',{value:nf.nf,onChange:e=>up(nf.id,'nf',e.target.value),placeholder:'Ex: 123456'})),
          h('div',{className:'field'},h('label',null,'Fornecedor'),h('input',{value:nf.forn,onChange:e=>up(nf.id,'forn',e.target.value),placeholder:'Concreteira'})),
          h('div',{className:'field'},h('label',null,'Matriz'),h('select',{value:nf.matriz,onChange:e=>up(nf.id,'matriz',e.target.value)},MATRIZES.map(m=>h('option',{key:m},m)))),

          h('div',{className:'field'},h('label',null,'fck (MPa)'),h('input',{type:'number',value:nf.fck,onChange:e=>up(nf.id,'fck',e.target.value),placeholder:'25'})),

// ── RECEBIMENTO ──────────────────────────────────────────
function Recebimento({perfil}){
  const[cps,setCps]=useState([]);const[load,setLoad]=useState(true);const[cont,setCont]=useState(1);
  const load2=async()=>{
    const{data}=await sb.from('amostras').select('*,obras(cliente,nome)').eq('fluxo','aguardando_recebimento').order('data_moldagem');
    setCps(data||[]);
    const{count}=await sb.from('amostras').select('*',{count:'exact',head:true}).eq('fluxo','recebido');
    setCont((count||0)+1);setLoad(false);
  };
  useEffect(()=>{load2();},[]);
  const conf=async id=>{
    const idAm='AM-'+String(cont).padStart(6,'0');
    await sb.from('amostras').update({fluxo:'recebido',data_recebimento:new Date().toISOString().split('T')[0],id_am:idAm,numero_registro:idAm,recebido_por:perfil.id}).eq('id',id);
    setCont(c=>c+1);load2();
  };
  const confTodos=async()=>{
    let c=cont;
    for(const cp of cps){
      const idAm='AM-'+String(c).padStart(6,'0');
      await sb.from('amostras').update({fluxo:'recebido',data_recebimento:new Date().toISOString().split('T')[0],id_am:idAm,numero_registro:idAm,recebido_por:perfil.id}).eq('id',cp.id);
      c++;
    }
    setCont(c);load2();
  };
  if(load)return h('div',{className:'loading'},h('div',{className:'spin'}),'Carregando...');
  return h('div',null,
    h('div',{className:'ph'},h('div',{className:'pt'},'Recebimento'),h('div',{className:'ps'},'CPs aguardando confirmação')),
    cps.length>0&&h('div',{className:'alert a-warn',style:{flexDirection:'column',gap:10,alignItems:'stretch'}},
      h('div',null,'🚚 ',h('strong',null,cps.length+' CP(s)'),' aguardando'),
      h('button',{className:'btn btn-p btn-full',onClick:confTodos},'✔ Confirmar Todos')
    ),
    h('div',{className:'card'},h('div',{className:'cb'},
      cps.length===0?h('div',{className:'empty'},h('div',{className:'empty-i'},'✅'),'Nenhum aguardando.'):
      cps.map(cp=>h('div',{key:cp.id,style:{borderBottom:'1px solid var(--line)',padding:'14px 0',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}},
        h('div',null,
          h('div',{style:{fontWeight:600}},cp.etiqueta_campo),
          h('div',{style:{fontSize:12,color:'var(--gray)',marginTop:2}},cp.obras?.nome+' · '+cp.matriz),
          h('div',{style:{fontSize:12,color:'var(--gray)'}},fmtD(cp.data_moldagem)+' → '+fmtD(cp.data_rompimento)+' ('+cp.idade_dias+'d)')
        ),
        h('button',{className:'btn btn-p btn-sm',style:{flexShrink:0},onClick:()=>conf(cp.id)},'✔')
      ))
    ))
  );
}

// ── CPs DO DIA ───────────────────────────────────────────
function CpsDia(){
  const[hj,setHj]=useState([]);const[prox,setProx]=useState([]);const[load,setLoad]=useState(true);
  const hoje=new Date().toISOString().split('T')[0];
  useEffect(()=>{
    (async()=>{
      const[{data:a},{data:b}]=await Promise.all([
        sb.from('amostras').select('*,obras(cliente,nome)').eq('data_rompimento',hoje).eq('fluxo','recebido'),
        sb.from('amostras').select('*,obras(cliente,nome)').gt('data_rompimento',hoje).eq('fluxo','recebido').is('fc_resultado',null).order('data_rompimento').limit(10),
      ]);
      setHj(a||[]);setProx(b||[]);setLoad(false);
    })();
  },[]);
  const imprimir=()=>{
    const linhas=hj.map(cp=>`<tr><td>${cp.id_am||cp.etiqueta_campo}</td><td>${cp.obras?.nome}</td><td>${cp.elemento||'–'}</td><td>${cp.idade_dias}d</td><td>${cp.fck_projeto||'–'}</td><td></td></tr>`).join('');
    const _html='<html><head><title>CPs</title><style>body{font-family:Arial;font-size:12px;padding:20px}table{width:100%;border-collapse:collapse}th{background:#1C1C1E;color:#fff;padding:7px}td{padding:7px;border-bottom:1px solid #eee}</style></head><body><h2>CPs para romper: '+fmtD(hoje)+'</h2><table><tr><th>Registro</th><th>Obra</th><th>Elemento</th><th>Idade</th><th>fck</th><th>fc obtido</th></tr>'+linhas+'</table></body></html>';
    const w=window.open('','_blank');if(!w){alert('Permita pop-ups.');return;}
    w.document.write(_html);w.document.close();w.print();
  };
  if(load)return h('div',{className:'loading'},h('div',{className:'spin'}),'Carregando...');
  return h('div',null,
    h('div',{className:'ph ph-row'},
      h('div',null,h('div',{className:'pt'},'CPs do Dia'),h('div',{className:'ps'},fmtD(hoje))),
      hj.length>0&&h('button',{className:'btn btn-p',onClick:imprimir},'🖨️')
    ),
    hj.length>0&&h('div',{className:'alert a-warn'},'🔔 ',h('strong',null,hj.length+' CP(s)'),' para romper hoje'),
    h('div',{className:'card'},
      h('div',{className:'ch ch-red'},'🔴 Hoje — '+fmtD(hoje)),
      h('div',{className:'cb'},
        hj.length===0?h('div',{className:'empty'},h('div',{className:'empty-i'},'✅'),'Nenhum CP hoje.'):
        hj.map(cp=>h('div',{key:cp.id,style:{borderBottom:'1px solid var(--line)',padding:'12px 0'}},
          h('div',{style:{fontWeight:600}},cp.id_am||cp.etiqueta_campo),
          h('div',{style:{fontSize:13,color:'var(--gray)',marginTop:3}},cp.obras?.nome),
          h('div',{style:{fontSize:12,color:'var(--gray)',marginTop:2}},cp.matriz+' · '+cp.idade_dias+'d · fck: '+(cp.fck_projeto||'–'))
        ))
      )
    ),
    prox.length>0&&h('div',{className:'card'},
      h('div',{className:'ch'},'📅 Próximos'),
      h('div',{className:'cb'},
        prox.map(cp=>h('div',{key:cp.id,style:{borderBottom:'1px solid var(--line)',padding:'12px 0',display:'flex',justifyContent:'space-between'}},
          h('div',null,h('div',{style:{fontWeight:600}},cp.id_am||cp.etiqueta_campo),h('div',{style:{fontSize:12,color:'var(--gray)',marginTop:2}},cp.obras?.nome+' · '+cp.idade_dias+'d')),
          h('div',{style:{fontSize:14,fontWeight:600}},fmtD(cp.data_rompimento))
        ))
      )
    )
  );
}


// ── IMPORTAR DADOS ────────────────────────────────────────
function Importar(){
  const[file,setFile]=useState(null);
  const[status,setStatus]=useState('idle'); // idle, reading, importing, done, error
  const[progress,setProgress]=useState({atual:0,total:0,etapa:''});
  const[erros,setErros]=useState([]);
  const[resultado,setResultado]=useState(null);

  const processar=async()=>{
    if(!file){alert('Selecione o arquivo Excel.');return;}
    setStatus('reading');setErros([]);setResultado(null);

    try{
      // Lê o Excel usando SheetJS via CDN
      const XLSX=window.XLSX;
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:'array',cellDates:true});
      
      const ws=wb.Sheets['RECEBIMENTO'];
      if(!ws){setStatus('error');setErros(['Aba "RECEBIMENTO" não encontrada no arquivo.']);return;}
      
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
      
      // Encontra o cabeçalho (linha com "Nº da Amostra")
      let headerIdx=-1;
      for(let i=0;i<rows.length;i++){
        if(rows[i].some(c=>String(c||'').includes('Nº da Amostra'))){headerIdx=i;break;}
      }
      if(headerIdx<0){setStatus('error');setErros(['Cabeçalho "Nº da Amostra" não encontrado.']);return;}
      
      const headers=rows[headerIdx];
      const col=name=>headers.findIndex(h=>String(h||'').includes(name));
      const iAm=col('Nº da Amostra');
      const iCliente=col('Cliente');
      const iObra=col('Obra');
      const iMatriz=col('Matriz');
      const iFuro=col('Furo/Série');
      const iReg=col('Registro');
      const iRelat=col('relatório');
      const iDataMold=col('Moldagem');
      const iDataRomp=col('Rompimento');
      const iIdade=col('Idade');
      const iObs=col('Observações');

      // Filtra linhas válidas
      const dataRows=rows.slice(headerIdx+1).filter(r=>{
        const am=r[iAm];
        return am&&!isNaN(parseFloat(String(am).trim()));
      });

      setStatus('importing');
      setProgress({atual:0,total:dataRows.length,etapa:'Criando obras...'});

      // 1. Cria obras únicas
      const obrasUnicas=new Map();
      dataRows.forEach(r=>{
        const c=String(r[iCliente]||'').trim();
        const n=String(r[iObra]||'').trim();
        if(c&&n)obrasUnicas.set(c+'|||'+n,{cliente:c,nome:n});
      });

      const obrasArr=[...obrasUnicas.values()];
      const obraIds=new Map();
      
      // Insere obras em lotes de 50
      const BATCH=50;
      for(let i=0;i<obrasArr.length;i+=BATCH){
        const batch=obrasArr.slice(i,i+BATCH);
        const{data}=await sb.from('obras').upsert(batch,{onConflict:'cliente,nome',ignoreDuplicates:false}).select('id,cliente,nome');
        if(data)data.forEach(o=>obraIds.set(o.cliente+'|||'+o.nome,o.id));
      }

      // Busca obras que já existiam
      const{data:existentes}=await sb.from('obras').select('id,cliente,nome');
      if(existentes)existentes.forEach(o=>obraIds.set(o.cliente+'|||'+o.nome,o.id));

      // 2. Prepara amostras
      const amostras=dataRows.map(r=>{
        const c=String(r[iCliente]||'').trim();
        const n=String(r[iObra]||'').trim();
        const am=String(r[iAm]||'').trim();
        const fmtDate=v=>{
          if(!v||v==='')return null;
          const s=String(v).trim();
          if(s.match(/^\d{4}-\d{2}-\d{2}$/))return s;
          const parts=s.split(/[/\-]/);
          if(parts.length===3){
            if(parts[0].length===4)return s.replace(/\//g,'-');
            return parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
          }
          return null;
        };
        return{
          id_am:'AM-'+am,
          cliente:c, obra_nome:n,
          matriz:String(r[iMatriz]||'').trim(),
          elemento:String(r[iFuro]||'').trim(),
          traco:String(r[iReg]||'').trim(),
          relatorio_origem:String(r[iRelat]||'').trim(),
          data_moldagem:fmtDate(r[iDataMold]),
          data_rompimento:fmtDate(r[iDataRomp]),
          idade_dias:parseInt(r[iIdade])||null,
          fck_projeto:null,
          status_resultado:'pendente',
          fluxo:'recebido',
          obs:String(r[iObs]||'').trim(),
          obra_id:obraIds.get(c+'|||'+n)||null,
        };
      });

      // 3. Insere amostras em lotes de 200
      let inseridos=0;const errsLocal=[];
      const AM_BATCH=50;
      for(let i=0;i<amostras.length;i+=AM_BATCH){
        setProgress({atual:i,total:amostras.length,etapa:'Importando amostras...'});
        const batch=amostras.slice(i,i+AM_BATCH);
        const{error}=await sb.from('amostras_importadas').upsert(batch,{onConflict:'id_am',ignoreDuplicates:true});
        if(error)errsLocal.push('Lote '+(i/AM_BATCH+1)+': '+error.message);
        else inseridos+=batch.length;
      }

      setProgress({atual:amostras.length,total:amostras.length,etapa:'Concluído!'});
      setErros(errsLocal);
      setResultado({obras:obrasArr.length,amostras:inseridos});
      setStatus('done');

    }catch(e){
      setStatus('error');
      setErros([String(e)]);
    }
  };

  const pct=progress.total>0?Math.round(progress.atual/progress.total*100):0;

  return h('div',null,
    h('div',{className:'ph'},h('div',{className:'pt'},'Importar Dados'),h('div',{className:'ps'},'Importe o histórico da planilha Excel para o Supabase')),
    h('div',{className:'alert a-info'},'📋 Selecione o arquivo CONTROLE_DE_RECEBIMENTO_DE_AMOSTRAS.xlsx. O importador cria as obras automaticamente e importa todas as amostras.'),
    
    h('div',{className:'card'},h('div',{className:'cb'},
      status==='idle'&&h(Fragment,null,
        h('div',{className:'field'},h('label',null,'Arquivo Excel (.xlsx)'),
          h('input',{type:'file',accept:'.xlsx,.xls',onChange:e=>setFile(e.target.files[0]),style:{fontSize:15,padding:'10px 0'}})
        ),
        file&&h('div',{className:'alert a-ok',style:{marginBottom:0}},'✔ Arquivo selecionado: '+file.name+' ('+Math.round(file.size/1024/1024*10)/10+'MB)'),
        h('div',{className:'br'},h('button',{className:'btn btn-p btn-full',onClick:processar,disabled:!file},'📥 Iniciar Importação'))
      ),
      (status==='reading'||status==='importing')&&h('div',null,
        h('div',{style:{marginBottom:16,fontWeight:600}},status==='reading'?'📖 Lendo arquivo...':progress.etapa),
        h('div',{style:{background:'var(--line)',borderRadius:8,height:12,overflow:'hidden',marginBottom:8}},
          h('div',{style:{background:'var(--red)',height:'100%',width:pct+'%',transition:'width .3s',borderRadius:8}})
        ),
        h('div',{style:{fontSize:13,color:'var(--gray)',textAlign:'center'}},
          status==='importing'?progress.atual+' / '+progress.total+' amostras ('+pct+'%)':'Aguarde...'
        )
      ),
      status==='done'&&h(Fragment,null,
        h('div',{className:'alert a-ok'},
          '✔ Importação concluída! ',h('strong',null,resultado?.obras+' obras'),' e ',h('strong',null,resultado?.amostras+' amostras'),' importadas com sucesso.'
        ),
        erros.length>0&&h('div',{className:'alert a-warn'},'⚠ '+erros.length+' erro(s) durante a importação: '+erros.slice(0,3).join(', ')),
        h('button',{className:'btn btn-s btn-full',onClick:()=>{setStatus('idle');setFile(null);}},'Importar outro arquivo')
      ),
      status==='error'&&h(Fragment,null,
        h('div',{className:'alert a-err'},'✘ Erro na importação: '+erros.join('. ')),
        h('button',{className:'btn btn-s btn-full',onClick:()=>{setStatus('idle');setFile(null);}},'Tentar novamente')
      )
    ))
  );
}

function Cura(){return h('div',null,h('div',{className:'ph'},h('div',{className:'pt'},'Cura'),h('div',{className:'ps'},'Em desenvolvimento')));}
function Relatorios(){return h('div',null,h('div',{className:'ph'},h('div',{className:'pt'},'Relatórios'),h('div',{className:'ps'},'Em desenvolvimento')));}

// ── APP ──────────────────────────────────────────────────
function App(){
  const[sessao,setSessao]=useState(null);const[load,setLoad]=useState(true);const[pag,setPag]=useState('dashboard');
  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){const{data:p}=await sb.from('perfis').select('*').eq('id',session.user.id).single();if(p)setSessao({user:session.user,perfil:p});}
      setLoad(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(ev,session)=>{
      if(!session){setSessao(null);return;}
      const{data:p}=await sb.from('perfis').select('*').eq('id',session.user.id).single();
      if(p)setSessao({user:session.user,perfil:p});
    });
    return()=>subscription.unsubscribe();
  },[]);
  if(load)return h('div',{className:'loading',style:{minHeight:'100vh'}},h('div',{className:'spin'}),'Carregando...');
  if(!sessao)return h(Login,{onLogin:setSessao});
  const logout=async()=>{await sb.auth.signOut();setSessao(null);};
  const pgs={dashboard:h(Dashboard,{perfil:sessao.perfil}),amostras:h(Amostras,null),cpsdia:h(CpsDia,null),moldagem:h(Moldagem,{perfil:sessao.perfil}),recebimento:h(Recebimento,{perfil:sessao.perfil}),obras:h(Obras,null),usuarios:h(Usuarios,null),cura:h(Cura,null),relatorios:h(Relatorios,null),importar:h(Importar,null)};
  const ini=(sessao.perfil.nome||'U')[0].toUpperCase();
  return h('div',{className:'app'},
    h('div',{className:'topbar'},
      h('div',{className:'topbar-logo'},h('div',{className:'topbar-icon'},'P'),'Projet'),
      h('div',{className:'topbar-user'},sessao.perfil.nome.split(' ')[0]+' · ',h('button',{onClick:logout,style:{background:'none',border:'none',color:'var(--gray2)',cursor:'pointer',fontSize:12,padding:0}},'Sair'))
    ),
    h(Sidebar,{perfil:sessao.perfil,pag,setPag,logout}),
    h('main',{className:'main'},pgs[pag]||pgs.dashboard),
    h(BottomNav,{perfil:sessao.perfil,pag,setPag})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
